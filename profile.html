  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
  <script>
    function createStatCard(number, label) {
      const card = document.createElement('div');
      card.className = 'pstat';

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = number;

      const lbl = document.createElement('div');
      lbl.className = 'lbl';
      lbl.textContent = label;

      card.append(num, lbl);
      return card;
    }

    function createCo2Card(stats) {
      const co2Goal = 10;
      const circ = 2 * Math.PI * 36;
      const pct = Math.min(stats.co2 / co2Goal, 1);
      const trees = Math.max(1, Math.round(stats.co2 * 2.5));

      const wrapper = document.createElement('div');
      wrapper.className = 'pstat co2-pstat';

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('class', 'co2-ring');
      svg.setAttribute('viewBox', '0 0 80 80');
      svg.setAttribute('width', '80');
      svg.setAttribute('height', '80');

      const track = document.createElementNS(svgNS, 'circle');
      track.setAttribute('class', 'co2-track');
      track.setAttribute('cx', '40');
      track.setAttribute('cy', '40');
      track.setAttribute('r', '36');

      const fill = document.createElementNS(svgNS, 'circle');
      fill.setAttribute('class', 'co2-fill');
      fill.setAttribute('id', 'co2-fill');
      fill.setAttribute('cx', '40');
      fill.setAttribute('cy', '40');
      fill.setAttribute('r', '36');
      fill.setAttribute('stroke-dasharray', circ.toFixed(1));
      fill.setAttribute('stroke-dashoffset', circ.toFixed(1));

      const numberText = document.createElementNS(svgNS, 'text');
      numberText.setAttribute('x', '40');
      numberText.setAttribute('y', '37');
      numberText.setAttribute('text-anchor', 'middle');
      numberText.setAttribute('dominant-baseline', 'middle');
      numberText.setAttribute('class', 'co2-center-num');
      numberText.textContent = stats.co2;

      const unitText = document.createElementNS(svgNS, 'text');
      unitText.setAttribute('x', '40');
      unitText.setAttribute('y', '52');
      unitText.setAttribute('text-anchor', 'middle');
      unitText.setAttribute('class', 'co2-center-unit');
      unitText.textContent = 'kg CO2';

      svg.append(track, fill, numberText, unitText);

      const lbl = document.createElement('div');
      lbl.className = 'lbl';
      lbl.textContent = 'Carbon Saved';

      const equiv = document.createElement('div');
      equiv.className = 'co2-equiv';
      equiv.textContent = `≈ ${trees} trees planted`;

      wrapper.append(svg, lbl, equiv);

      requestAnimationFrame(() => {
        fill.style.strokeDashoffset = (circ * (1 - pct)).toFixed(1);
      });

      return wrapper;
    }

    function createBadgeCard(badge) {
      const card = document.createElement('div');
      card.className = `badge-card ${badge.unlocked ? 'unlocked' : 'locked'}`;
      card.title = badge.unlocked ? 'Unlocked' : `Locked - ${badge.desc}`;

      const icon = document.createElement('div');
      icon.className = 'badge-icon';
      icon.textContent = badge.icon;

      const name = document.createElement('div');
      name.className = 'badge-name';
      name.textContent = badge.name;

      const desc = document.createElement('div');
      desc.className = 'badge-desc';
      desc.textContent = badge.desc;

      card.append(icon, name, desc);
      return card;
    }

    function createActivityItem(activity) {
      const item = document.createElement('div');
      item.className = 'activity-item';

      const icon = document.createElement('div');
      icon.className = 'activity-icon';
      icon.textContent = activity.icon;

      const textWrap = document.createElement('div');
      textWrap.className = 'activity-text';

      const strong = document.createElement('strong');
      strong.textContent = activity.text;

      const sub = document.createElement('span');
      sub.textContent = activity.sub;

      textWrap.append(strong, sub);

      const pill = document.createElement('span');
      pill.className = `pill ${activity.pillCls} activity-pill`;
      pill.textContent = activity.pill;

      item.append(icon, textWrap, pill);
      return item;
    }

    function renderProfile() {
      seedStatsIfNew();
      const stats = getStats();

      const statsEl = document.getElementById('profile-stats');
      statsEl.replaceChildren(
        createStatCard(stats.shared, 'Items Shared'),
        createStatCard(stats.claimed, 'Items Claimed'),
        createCo2Card(stats)
      );

      const badgesEl = document.getElementById('badges-grid');
      badgesEl.replaceChildren(...getUnlockedBadges().map(createBadgeCard));

      const activities = [
        { icon: 'SB', text: 'Shared Sourdough Bread', sub: '2 days ago', pill: 'Shared', pillCls: 'pill-green' },
        { icon: 'OM', text: 'Claimed Organic Milk', sub: '3 days ago', pill: 'Claimed', pillCls: 'pill-gray' },
        { icon: 'WL', text: 'Shared Whole Wheat Loaf', sub: '5 days ago', pill: 'Shared', pillCls: 'pill-green' },
        { icon: 'CR', text: 'Used Commute Relay', sub: '1 week ago', pill: 'Route Match', pillCls: 'pill-amber' },
        { icon: 'FA', text: 'Claimed Fresh Apples', sub: '1 week ago', pill: 'Claimed', pillCls: 'pill-gray' },
      ];

      const activityEl = document.getElementById('activity-list');
      activityEl.replaceChildren(...activities.map(createActivityItem));
    }

    renderProfile();
  </script>
</body>
