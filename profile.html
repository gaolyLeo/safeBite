<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — SafeBite</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Top Nav (desktop) -->
  <nav class="top-nav">
    <div class="logo"><span class="logo-dot"></span>Safe<em>Bite</em></div>
    <div class="top-nav-links">
      <a href="index.html" data-page="index.html">Home</a>
      <a href="browse.html" data-page="browse.html">Browse</a>
      <a href="share.html" data-page="share.html">Share Food</a>
      <a href="profile.html" data-page="profile.html" class="active">Profile</a>
    </div>
  </nav>

  <main class="page">

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="avatar">👤</div>
      <div>
        <h2>Alex Chen</h2>
        <div class="profile-sub">Member since April 2026 · Eco Hero</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stats" id="profile-stats"></div>

    <!-- Badges -->
    <h2 class="section-heading"><span class="tag">Badges</span> Your Achievements</h2>
    <div class="badges-grid" id="badges-grid"></div>

    <div class="divider"></div>

    <!-- Activity Feed -->
    <h2 class="section-heading"><span class="tag">Activity</span> Recent History</h2>
    <div class="activity-list" id="activity-list"></div>

  </main>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav">
    <a href="index.html" data-page="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="browse.html" data-page="browse.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      Browse
    </a>
    <a href="share.html" data-page="share.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      Share
    </a>
    <a href="profile.html" data-page="profile.html" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
  <script>
    function renderProfile() {
      seedStatsIfNew();
      const s = getStats();

      // Stats
      const statsEl = document.getElementById('profile-stats');
      const co2Goal = 10;
      const circ = 2 * Math.PI * 36; // r=36
      const pct = Math.min(s.co2 / co2Goal, 1);
      const trees = Math.max(1, Math.round(s.co2 * 2.5));
      statsEl.innerHTML = `
        <div class="pstat"><div class="num">${s.shared}</div><div class="lbl">Items Shared</div></div>
        <div class="pstat"><div class="num">${s.claimed}</div><div class="lbl">Items Claimed</div></div>
        <div class="pstat co2-pstat">
          <svg class="co2-ring" viewBox="0 0 80 80" width="80" height="80">
            <circle class="co2-track" cx="40" cy="40" r="36"/>
            <circle class="co2-fill" id="co2-fill" cx="40" cy="40" r="36"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}"/>
            <text x="40" y="37" text-anchor="middle" dominant-baseline="middle" class="co2-center-num">${s.co2}</text>
            <text x="40" y="52" text-anchor="middle" class="co2-center-unit">kg CO₂</text>
          </svg>
          <div class="lbl">Carbon Saved</div>
          <div class="co2-equiv">🌱 ≈ ${trees} trees planted</div>
        </div>
      `;
      // Animate ring after DOM paint
      requestAnimationFrame(() => {
        const fill = document.getElementById('co2-fill');
        if (fill) fill.style.strokeDashoffset = (circ * (1 - pct)).toFixed(1);
      });

      // Badges
      const badgesEl = document.getElementById('badges-grid');
      badgesEl.innerHTML = getUnlockedBadges().map(b => `
        <div class="badge-card ${b.unlocked ? 'unlocked' : 'locked'}" title="${b.unlocked ? 'Unlocked' : 'Locked — ' + b.desc}">
          <div class="badge-icon">${b.icon}</div>
          <div class="badge-name">${b.name}</div>
          <div class="badge-desc">${b.desc}</div>
        </div>
      `).join('');

      // Activity Feed
      const activities = [
        { icon: '🥖', text: 'Shared Sourdough Bread', sub: '2 days ago', pill: 'Shared', pillCls: 'pill-green' },
        { icon: '🤝', text: 'Claimed Organic Milk', sub: '3 days ago', pill: 'Claimed', pillCls: 'pill-gray' },
        { icon: '🥛', text: 'Shared Whole Wheat Loaf', sub: '5 days ago', pill: 'Shared', pillCls: 'pill-green' },
        { icon: '🚗', text: 'Used Commute Relay', sub: '1 week ago', pill: 'Route Match', pillCls: 'pill-amber' },
        { icon: '🍎', text: 'Claimed Fresh Apples', sub: '1 week ago', pill: 'Claimed', pillCls: 'pill-gray' },
      ];
      document.getElementById('activity-list').innerHTML = activities.map(a => `
        <div class="activity-item">
          <div class="activity-icon">${a.icon}</div>
          <div class="activity-text">
            <strong>${a.text}</strong>
            <span>${a.sub}</span>
          </div>
          <span class="pill ${a.pillCls} activity-pill">${a.pill}</span>
        </div>
      `).join('');
    }

    renderProfile();
  </script>
</body>
</html>
